[package]
name = "maestro-server"
version = "0.1.0"
edition = "2021"
description = "Maestro remote headless server — spawns ACP agents on SSH hosts"
license = "GPL-3.0-only"

[[bin]]
name = "maestro-server"
path = "src/main.rs"

[dependencies]
maestro-protocol = { path = "../maestro-protocol" }
agent-client-protocol = "0.10.4"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat"] }
serde_json = "1"
async-trait = "0.1"
futures = "0.3"
