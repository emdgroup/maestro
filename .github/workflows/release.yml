name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile

      - run: pnpm tauri build

      - uses: actions/cache@v4
        with:
          path: target/x86_64-unknown-linux-gnu/release/maestro-server
          key: maestro-server-linux-${{ github.sha }}
          enableCrossOsArchive: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
          generate_release_notes: true
          body: |
            > **Note:** These binaries are unsigned. macOS users may need to right-click → Open to bypass Gatekeeper. Windows users may see a SmartScreen warning.

  build-macos-arm64:
    name: Build macOS (arm64)
    runs-on: macos-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache/restore@v4
        with:
          path: target/x86_64-unknown-linux-gnu/release/maestro-server
          key: maestro-server-linux-${{ github.sha }}
          fail-on-cache-miss: true

      - uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile

      - run: pnpm tauri build
        env:
          SKIP_REMOTE_BUILD: "1"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz

  build-macos-x86:
    name: Build macOS (x86_64)
    runs-on: macos-15
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: actions/cache/restore@v4
        with:
          path: target/x86_64-unknown-linux-gnu/release/maestro-server
          key: maestro-server-linux-${{ github.sha }}
          fail-on-cache-miss: true

      - uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile

      - run: pnpm tauri build --target x86_64-apple-darwin
        env:
          SKIP_REMOTE_BUILD: "1"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache/restore@v4
        with:
          path: target/x86_64-unknown-linux-gnu/release/maestro-server
          key: maestro-server-linux-${{ github.sha }}
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile

      - run: pnpm tauri build
        env:
          SKIP_REMOTE_BUILD: "1"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
