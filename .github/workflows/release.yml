name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    name: Build Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            xdg-utils

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - run: bun install --frozen-lockfile

      - name: Build maestro-server
        run: cargo build -p maestro-server --release

      - run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload maestro-server binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp target/release/maestro-server target/release/maestro-server-linux-x86_64
          gh release upload ${{ github.ref_name }} \
            target/release/maestro-server-linux-x86_64 --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64-updater
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.sig

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb

  build-linux-arm64:
    name: Build Linux (arm64)
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            xdg-utils

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - run: bun install --frozen-lockfile

      - name: Build maestro-server
        run: cargo build -p maestro-server --release

      - run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload maestro-server binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp target/release/maestro-server target/release/maestro-server-linux-arm64
          gh release upload ${{ github.ref_name }} \
            target/release/maestro-server-linux-arm64 --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: linux-arm64-updater
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.sig

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb

  build-macos-arm64:
    name: Build macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - run: bun install --frozen-lockfile

      - name: Build maestro-server
        run: cargo build -p maestro-server --release

      - run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload maestro-server binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp target/release/maestro-server target/release/maestro-server-macos-arm64
          gh release upload ${{ github.ref_name }} \
            target/release/maestro-server-macos-arm64 --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-updater
          path: |
            target/release/bundle/macos/*.app.tar.gz
            target/release/bundle/macos/*.app.tar.gz.sig

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            target/release/bundle/dmg/*.dmg

  build-windows-x86_64:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - run: bun install --frozen-lockfile

      - name: Build maestro-server
        run: cargo build -p maestro-server --release

      - run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload maestro-server binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cp target/release/maestro-server.exe target/release/maestro-server-windows-x86_64.exe
          gh release upload ${{ github.ref_name }} \
            "target/release/maestro-server-windows-x86_64.exe" --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: windows-updater
          path: |
            target/release/bundle/nsis/*-setup.exe
            target/release/bundle/nsis/*-setup.exe.sig

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  publish:
    name: Publish update manifest
    needs: [build-linux-x86_64, build-linux-arm64, build-macos-arm64, build-windows-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Generate latest.json and upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun .github/scripts/generate-update-manifest.cjs
