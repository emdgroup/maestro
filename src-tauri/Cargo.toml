[package]
name = "gsd-demo"
version = "0.1.0"
edition = "2021"

[lib]
name = "gsd_demo"
path = "src/lib.rs"

[[bin]]
name = "gsd_demo"
path = "src/main.rs"

[dependencies]
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"

[dev-dependencies]
